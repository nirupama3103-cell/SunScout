<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunScout</title>
  </head>
  <body>
  <div class="scene">
    <div class="sun-wrapper">
      <div class="sun3d">
        <div class="sun-body"></div>
        <div class="sun-eye l"></div>
        <div class="sun-eye r"></div>
        <div class="sun-smile"></div>
        <div class="sun-ray" style="transform:rotate(0deg)"></div>
        <div class="sun-ray" style="transform:rotate(45deg)"></div>
        <div class="sun-ray" style="transform:rotate(90deg)"></div>
        <div class="sun-ray" style="transform:rotate(135deg)"></div>
        <div class="sun-ray" style="transform:rotate(180deg)"></div>
        <div class="sun-ray" style="transform:rotate(225deg)"></div>
        <div class="sun-ray" style="transform:rotate(270deg)"></div>
        <div class="sun-ray" style="transform:rotate(315deg)"></div>
      </div>
      <div class="waving-hand">&#x1F44B;</div>
    </div>
    <button class="share-btn" onclick="if(navigator.share){navigator.share({title:'SunScout',url:location.href});}else{navigator.clipboard.writeText(location.href).then(()=>{var b=this;b.textContent='Copied!';setTimeout(()=>{b.innerHTML='&#x1F4E4; Share';},1800);});}">&#x1F4E4; Share</button>
    <div class="cloud3d c1"><div class="cb"></div><div class="ct t1"></div><div class="ct t2"></div></div>
    <div class="cloud3d c2"><div class="cb"></div><div class="ct t1"></div><div class="ct t2"></div></div>
    <div class="cloud3d c3"><div class="cb"></div><div class="ct t1"></div><div class="ct t2"></div></div>
    <div class="cloud3d c4"><div class="cb"></div><div class="ct t1"></div><div class="ct t2"></div></div>
    <div class="tree3d" style="left:0%;bottom:60px;--h:110px;--w:60px;--tc:#2d6a2d;--ts:#1a4a1a;--delay:0s"><div class="t-top"></div><div class="t-mid"></div><div class="t-trunk"></div></div>
    <div class="tree3d" style="left:4%;bottom:60px;--h:145px;--w:76px;--tc:#3a7a3a;--ts:#2d5a2d;--delay:.4s"><div class="t-top"></div><div class="t-mid"></div><div class="t-trunk"></div></div>
    <div class="tree3d" style="left:8%;bottom:60px;--h:90px;--w:50px;--tc:#4a8a4a;--ts:#3a7a3a;--delay:.8s"><div class="t-top"></div><div class="t-mid"></div><div class="t-trunk"></div></div>
    <div class="tree3d" style="right:0%;bottom:60px;--h:150px;--w:80px;--tc:#2d6a2d;--ts:#1a4a1a;--delay:.1s"><div class="t-top"></div><div class="t-mid"></div><div class="t-trunk"></div></div>
    <div class="tree3d" style="right:4%;bottom:60px;--h:112px;--w:62px;--tc:#3a7a3a;--ts:#2d5a2d;--delay:.6s"><div class="t-top"></div><div class="t-mid"></div><div class="t-trunk"></div></div>
    <div class="tree3d" style="right:8%;bottom:60px;--h:130px;--w:70px;--tc:#4a8a4a;--ts:#3a7a3a;--delay:.3s"><div class="t-top"></div><div class="t-mid"></div><div class="t-trunk"></div></div>
    <div class="flower lg" style="left:13%;bottom:68px;animation-delay:0s">&#x1F338;</div>
    <div class="flower" style="left:17%;bottom:64px;animation-delay:.5s">&#x1F33C;</div>
    <div class="flower lg" style="left:21%;bottom:72px;animation-delay:1s">&#x1F33A;</div>
    <div class="flower" style="left:25%;bottom:65px;animation-delay:.8s">&#x1F337;</div>
    <div class="flower lg" style="right:13%;bottom:68px;animation-delay:.3s">&#x1F33C;</div>
    <div class="flower" style="right:17%;bottom:64px;animation-delay:.9s">&#x1F338;</div>
    <div class="flower lg" style="right:21%;bottom:72px;animation-delay:1.4s">&#x1F33B;</div>
    <div class="flower" style="right:25%;bottom:65px;animation-delay:.6s">&#x1F33A;</div>
    <div class="butterfly b1">&#x1F98B;</div>
    <div class="butterfly b2">&#x1F98B;</div>
    <div class="butterfly b3">&#x1F98B;</div>
    <div class="butterfly b4">&#x1F98B;</div>
    <div class="grass"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/main.jsx"></script>
  </body>
</html>
